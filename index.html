body {
  background: #f5f7fb;
}

/* 卡片 */
.card {
  margin-top: 20px;
}

/* match row */
.match {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
}

/* 防止長文字 */
.name {
  white-space: nowrap;
}

/* checkbox 基本樣式 */
.cb {
  display: flex;
  align-items: center;
  gap: 6px;
}

.cb input {
  margin: 0;
}

/* =========================
   TEAM GRID
========================= */

.team-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 8px 12px;
}

/* =========================
   TEXT SWITCH
========================= */

.mobile-text {
  display: none;
}

.desktop-text {
  display: inline;
}

/* =========================
   📱 TABLET / MOBILE
========================= */

@media (max-width: 768px) {

  .team-grid {
    grid-template-columns: repeat(6, minmax(0, 1fr));
  }

  .mobile-text {
    display: inline;
  }

  .desktop-text {
    display: none;
  }

  .name {
    display: none;
  }
}

/* 📱 very small */
@media (max-width: 420px) {
  .team-grid {
    grid-template-columns: repeat(6, minmax(0, 1fr));
  }
}

/* =========================
   DESKTOP ONLY ICON OPTION
========================= */

@media (min-width: 769px) {
  .flag {
    display: none;
  }
}
</style>

<script>
//Get from Google Script
const API_URL = "https://script.google.com/macros/s/AKfycbwRUJ_Qe_gr2_ZP8IjpEBpfKBD9TXBVkubfBizmS2x-0ULMIfXqatIEtaOd8Hb0skgIcg/exec";

let matches = [];

// =========================
// 📥 Load data
// =========================
async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now(), {
        cache: "no-store"
    });

    const text = await res.text();

    matches = JSON.parse(text);
    console.log("✅ Loaded matches:", matches);

  } catch (err) {
    console.error("❌ Fetch error:", err);
  }
}

loadData();

// =========================
// 🎯 Get selections
// =========================
function toICS(isoString) {
  return new Date(isoString)
    .toISOString()
    .replace(/[-:]/g, "")
    .split(".")[0] + "Z";
}
function renderTeam(name) {
  const FLAG_MAP={"墨西哥":"🇲🇽","南非":"🇿🇦","南韓":"🇰🇷","捷克":"🇨🇿","加拿大":"🇨🇦","波士尼亞":"🇧🇦","卡達":"🇶🇦","瑞士":"🇨🇭","巴西":"🇧🇷","摩洛哥":"🇲🇦","海地":"🇭🇹","蘇格蘭":"🇬🇧","美國":"🇺🇸","巴拉圭":"🇵🇾","澳洲":"🇦🇺","土耳其":"🇹🇷","德國":"🇩🇪","庫拉索":"🇨🇼","古拉索":"🇨🇼","象牙海岸":"🇨🇮","厄瓜多":"🇪🇨","荷蘭":"🇳🇱","日本":"🇯🇵","瑞典":"🇸🇪","突尼西亞":"🇹🇳","比利時":"🇧🇪","埃及":"🇪🇬","伊朗":"🇮🇷","紐西蘭":"🇳🇿","西班牙":"🇪🇸","維德角":"🇨🇻","沙烏地阿拉伯":"🇸🇦","烏拉圭":"🇺🇾","法國":"🇫🇷","塞內加爾":"🇸🇳","伊拉克":"🇮🇶","挪威":"🇳🇴","阿根廷":"🇦🇷","阿爾及利亞":"🇩🇿","奧地利":"🇦🇹","約旦":"🇯🇴","葡萄牙":"🇵🇹","剛果民主共和國":"🇨🇩","烏茲別克":"🇺🇿","哥倫比亞":"🇨🇴","英格蘭":"🇬🇧","克羅埃西亞":"🇭🇷","迦納":"🇬🇭","巴拿馬":"🇵🇦"};

  const isMobile = window.innerWidth <= 768;

  if (isMobile) {
    return `<span class="flag">${flagMap[name] || "🏳️"}</span>`;
  } else {
    return `<span class="name">${name}</span>`;
  }
}
// stage (group / knockout stages)
function getSelectedStages() {
  return [...document.querySelectorAll("input[data-stage]:checked")]
    .map(el => el.value);
}

// group (A-H)
function getSelectedGroups() {
  return [...document.querySelectorAll("input[data-group]:checked")]
    .map(el => el.value);
}

// team
function getSelectedTeams() {
  return [...document.querySelectorAll("input[data-team]:checked")]
    .map(el => el.value);
}

// =========================
// 🔗 UI logic (group auto toggle)
// =========================
const stageGroup = document.getElementById("stage-group");
const groupBoxes = document.querySelectorAll("input[data-group]");

if (stageGroup) {
  stageGroup.addEventListener("change", (e) => {
    const enabled = e.target.checked;

    groupBoxes.forEach(cb => {
      cb.disabled = !enabled;
      if (!enabled) cb.checked = false;
    });
  });
}
function generate() {

  const stages = getSelectedStages();
  const groups = getSelectedGroups();
  const teams = getSelectedTeams();

  const resultMap = new Map();

  // =========================
  // 🟡 1. Stage filter (UNION)
  // =========================
  if (stages.length > 0) {
    matches
      .filter(m => stages.includes(m.round))
      .forEach(m => resultMap.set(m.id, m));
  }

  // =========================
  // 🟢 2. Group filter (UNION)
  // =========================
  if (groups.length > 0) {
    matches
      .filter(m => groups.includes(m.group))
      .forEach(m => resultMap.set(m.id, m));
  }

  // =========================
  // 🔵 3. Team filter (UNION)
  // =========================
  if (teams.length > 0) {
    matches
      .filter(m =>
        teams.includes(m.team1) ||
        teams.includes(m.team2)
      )
      .forEach(m => resultMap.set(m.id, m));
  }

  // =========================
  // 🎯 FINAL UNION RESULT
  // =========================
  let filtered = Array.from(resultMap.values());

  // ⭐ 4. SORT by time (IMPORTANT)
  filtered.sort((a, b) => new Date(a.time) - new Date(b.time));

  console.log("🎯 Final matches:", filtered);

  // =========================
  // 📅 Build ICS
  // =========================
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\n";

  filtered.forEach(m => {

    const dtStart = toICS(m.time);
    const dtEnd = toICS(new Date(new Date(m.time).getTime() + 120 * 60 * 1000));

    ics += `BEGIN:VEVENT\r\n`;
    ics += `UID:${m.id}\r\n`;
    ics += `DTSTAMP:${new Date().toISOString().replace(/[-:]/g, "").split(".")[0]}Z\r\n`;
    ics += `SUMMARY:[${m.round}] ${m.team1} vs ${m.team2}\r\n`;
    ics += `DTSTART:${dtStart}\r\n`;
    ics += `DTEND:${dtEnd}\r\n`;
    ics += `END:VEVENT\r\n`;
  });

  ics += "END:VCALENDAR";

  // =========================
  // 📥 Download
  // =========================
  const blob = new Blob([ics], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "fifa.ics";
  a.click();
}
</script>

</body>
</html>
